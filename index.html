<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time Trails</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/worldIndiaLow.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Time Trails</h1>

  <div id="auth-container" style="text-align: center; margin-bottom: 20px;">
    <div id="logged-out-ui">
      <input type="email" id="email" placeholder="Email" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      <input type="password" id="password" placeholder="Password" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      <button id="login-btn" class="controls button" style="background-color: #007BFF; color: white;">Login</button>
      <button id="signup-btn" class="controls button" style="background-color: #6c757d; color: white;">Sign Up</button>
    </div>
    <div id="logged-in-ui" style="display: none;">
      <span id="user-display" style="margin-right: 15px; font-weight: bold;"></span>
      <button id="logout-btn" style="padding: 8px; border-radius: 4px; cursor: pointer;">Logout</button>
      <button id="toggle-edit" style="padding: 8px; background-color: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px;">Manage Visits</button>
    </div>
  </div>

  <div class="controls" id="visit-controls" style="display: none; justify-content: center;">
    <label for="year-select">Year:</label>
    <select id="year-select"><option value="">Select year</option></select>
    <label for="country-select">Country:</label>
    <select id="country-select"><option value="">Select country</option></select>
    <button id="add-visit">Add Visit</button>
  </div>

  <div id="visit-list-container" style="display: none; max-width: 800px; margin: 20px auto;">
    <h2>Your Visits</h2>
    <table id="visit-list">
      <thead><tr><th>Year</th><th>Country</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="slider-container">
    <label for="year-slider">Year: <span id="year-label"></span></label>
    <input type="range" id="year-slider" step="1">
    <button id="play-button" title="Play timeline">▶</button>
    <button id="reset-button" title="Reset timeline">⟲</button>
  </div>

  <div id="chartdiv"><div id="map-label" class="map-label"></div></div>

  <script src="script.js"></script>
</body>
</html>
